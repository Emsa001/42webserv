log_format: "[server] | 📅 [date] [time] | 🔄 [[method]] [uri] | [status] ([reason]) | 📦 [size]B"

server0:
    server_name: "localhost"
    listen: "80"
    keep_alive: 30
    location:
        path: "/"
        root: "/tester/"
        methods: "GET"

    location:
        path: "/put_test"
        root: "/tester/"
        methods: "PUT"

    location:
        path: "/post_body"
        root: "/tester/"
        methods: "POST"
        max_client_body_size: 100

    location:
        path: "/"
        extension: ".bla"
        root: "/tester/"
        index: "run_tester.sh"
        methods: "GET POST"
        cgi: true

    location:
        path: "/directory"
        index: "youpi.bad_extension"
        root: "/tester/YoupiBanane/"
        methods: "GET POST"
        autoindex: true

    location:
        path: "/directory/Yeah"
        root: "/tester/YoupiBanane/Yeah/"
        methods: "GET"

