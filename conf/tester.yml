log_format: "[server] | 📅 [date] [time] | 🔄 [[method]] [uri] | [status] ([reason]) | 📦 [size]B"

server0:
    server_name: "IntraTester"
    listen: "80"
    max_client_body_size: 1000
    max_client_header_size: 1024
    keep_alive: 30

    location:
        path: "/"
        root: "/tester/"
        methods: "GET"

    location:
        path: "/"
        extension: ".bla"
        root: "/tester/"
        index: "run_tester.sh"
        methods: "POST"
        cgi: true

    location:
        path: "/put_test"
        root: "/tester/"
        methods: "PUT"

    location:
        path: "/post_body"
        root: "/tester/"
        methods: "POST"

    location:
        path: "/directory"
        index: "youpi.bad_extension"
        root: "/tester/YoupiBanane"
        methods: "GET"

